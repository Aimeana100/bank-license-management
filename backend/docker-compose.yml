services:
  postgres:
    image: "postgres:16-alpine"
    container_name: license-postgres
    restart: always
    env_file:
      - /.env
    environment:
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 5s
      timeout: 3s
      retries: 10
  api:
    container_name: license-app
    build:
      dockerfile: ./backend/Dockerfile
      context: .
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PORT}:${PORT}"
    volumes:
      - ./uploads:/app/uploads
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432

volumes:
  postgres_data:

